x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  redis_clone:
    build:
      context: .
      dockerfile: Dockerfile.redis
    ports:
      - "31337:31337"
    environment:
      REDIS_BIND_HOST: 0.0.0.0
      REDIS_PORT: 31337
      AOF_FILE: /app/data/appendonly.aof
    volumes:
      - .:/app
      - redis_data:/app/data
    command: ["python", "-m", "redis_clone.server"]
    logging: *default-logging

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    depends_on:
      - redis_clone
    environment:
      REDIS_HOST: redis_clone
      REDIS_PORT: 31337
    volumes:
      - .:/app
    command: ["uvicorn", "fastapi_cache.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload", "--no-access-log"]
    logging: *default-logging

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      - redis_clone
    environment:
      REDIS_HOST: redis_clone
      REDIS_PORT: 31337
      SEMANTIC_CACHE_THRESHOLD: "0.75"
      SEMANTIC_CACHE_MAX_ENTRIES: "1000"
      WORKER_LEASE_SECONDS: "60"
      VECTOR_SEARCH_ENGINE: "faiss"
    volumes:
      - .:/app
    command: ["python", "-m", "worker.worker"]
    logging: *default-logging

  prometheus:
    image: prom/prometheus:v2.55.0
    depends_on:
      - api
    ports:
      - "9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    logging: *default-logging

volumes:
  redis_data:
  prometheus_data:

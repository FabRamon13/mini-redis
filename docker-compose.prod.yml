x-default-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "5"

services:
  redis_clone:
    build:
      context: .
      dockerfile: Dockerfile.redis
    environment:
      REDIS_BIND_HOST: 0.0.0.0
      REDIS_PORT: 31337
      AOF_FILE: /app/data/appendonly.aof
    volumes:
      - redis_data:/app/data
    command: ["python", "-m", "redis_clone.server"]
    restart: unless-stopped
    logging: *default-logging

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    depends_on:
      - redis_clone
    environment:
      REDIS_HOST: redis_clone
      REDIS_PORT: 31337
    command: ["uvicorn", "fastapi_cache.main:app", "--host", "0.0.0.0", "--port", "8000", "--no-access-log"]
    restart: unless-stopped
    logging: *default-logging

  worker:
    build:
      context: .
      dockerfile: Dockerfile.worker
    depends_on:
      - redis_clone
    environment:
      REDIS_HOST: redis_clone
      REDIS_PORT: 31337
      SEMANTIC_CACHE_THRESHOLD: "0.75"
      SEMANTIC_CACHE_MAX_ENTRIES: "1000"
      WORKER_LEASE_SECONDS: "60"
      WORKER_RECOVERY_INTERVAL_SECONDS: "30"
      WORKER_HEARTBEAT_INTERVAL_SECONDS: "15"
      VECTOR_SEARCH_ENGINE: "faiss"
    command: ["python", "-m", "worker.worker"]
    restart: unless-stopped
    logging: *default-logging

  prometheus:
    image: prom/prometheus:v2.55.0
    depends_on:
      - api
    ports:
      - "127.0.0.1:9090:9090"
    volumes:
      - ./prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    restart: unless-stopped
    logging: *default-logging
  
  grafana:
    image: grafana/grafana:11.3.0
    depends_on:
      - prometheus
    ports:
      - "127.0.0.1:3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    logging: *default-logging

volumes:
  redis_data:
  prometheus_data:
  grafana_data:
